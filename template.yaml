AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SWARD - Lambda procesamiento de interacciones académicas

Globals:
  Function:
    Timeout: 60
    Runtime: python3.11
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        LOG_LEVEL: INFO

Parameters:
  DatabaseUrl:
    Type: String
    Description: URL de conexión a trazabilidad_db

Resources:
  InteraccionesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.lambda_handler
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:sward-interacciones"
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
